sonar.projectKey=CashsinoPL
sonar.organization=polonez555

# Source and test directories
sonar.sources=lib,app
sonar.tests=tests

# Exclude some files from analysis
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/coverage/**,**jest.config.ts,**next.config.js

# TypeScript-specific settings
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Code coverage exclusions
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/jest.config.ts,**/next.config.js

# Encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=ts